name: Auto Collect and Deploy

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: '强制重新生成所有静态文件（不采集数据）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_collect:
        description: '跳过数据采集，仅更新配置相关文件'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Check config changes and regenerate static files
        run: |
          echo "🔍 检查配置文件..."
          
          if [ -f "config.json" ]; then
            echo "✅ 找到配置文件"
            
            DOMAIN=$(python -c "import json; config=json.load(open('config.json')); print(config.get('siteDomain', ''))")
            PROTOCOL=$(python -c "import json; config=json.load(open('config.json')); print(config.get('settings', {}).get('protocol', 'https'))")
            
            echo "📝 当前配置:"
            echo "   域名: $DOMAIN"
            echo "   协议: $PROTOCOL"
            
            python << 'EOF'
            import json
            import os
            from datetime import datetime
            
            def generate_sitemap():
                try:
                    with open('config.json', 'r', encoding='utf-8') as f:
                        config = json.load(f)
                    
                    domain = config.get('siteDomain', 'your-domain.github.io')
                    protocol = config.get('settings', {}).get('protocol', 'https')
                    
                    if not domain.startswith(('http://', 'https://')):
                        base_url = f"{protocol}://{domain}"
                    else:
                        base_url = domain
                    
                    sitemap_content = f'''<?xml version='1.0' encoding='utf-8'?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
  <url>
    <loc>{base_url}/</loc>
    <lastmod>{datetime.now().strftime('%Y-%m-%d')}</lastmod>
    <changefreq>daily</changefreq>
    <priority>1.0</priority>
  </url>
  <url>
    <loc>{base_url}/index.html</loc>
    <lastmod>{datetime.now().strftime('%Y-%m-%d')}</lastmod>
    <changefreq>daily</changefreq>
    <priority>1.0</priority>
  </url>
</urlset>'''
                    
                    with open('sitemap.xml', 'w', encoding='utf-8') as f:
                        f.write(sitemap_content)
                    
                    file_size = os.path.getsize('sitemap.xml')
                    print(f"✅ 网站地图已生成: sitemap.xml")
                    print(f"   文件大小: {file_size / 1024:.2f} KB")
                    print(f"   基础域名: {base_url}")
                    
                except Exception as e:
                    print(f"❌ 网站地图生成失败: {e}")
            
            def generate_robots():
                try:
                    with open('config.json', 'r', encoding='utf-8') as f:
                        config = json.load(f)
                    
                    domain = config.get('siteDomain', 'your-domain.github.io')
                    protocol = config.get('settings', {}).get('protocol', 'https')
                    
                    if not domain.startswith(('http://', 'https://')):
                        base_url = f"{protocol}://{domain}"
                    else:
                        base_url = domain
                    
                    robots_content = f'''# Robots.txt for {base_url}
# Generated on {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}
# Auto-generated by Content Collector System

# 允许所有搜索引擎访问
User-agent: *
Allow: /
Allow: /index.html
Allow: /sitemap.xml


# 禁止访问动态文件和数据文件
Disallow: /*.json$
Disallow: /*.py$
Disallow: /*.sh$
Disallow: /*.yml$
Disallow: /*.yaml$
Disallow: /config*
Disallow: /data*
Disallow: /collector*
Disallow: /.github/

# 禁止访问脚本和工具文件
Disallow: /*collector*
Disallow: /*config*

# Sitemap位置
Sitemap: {base_url}/sitemap.xml

# Crawl-delay建议（秒）
Crawl-delay: 1'''
                    
                    with open('robots.txt', 'w', encoding='utf-8') as f:
                        f.write(robots_content)
                    
                    file_size = os.path.getsize('robots.txt')
                    print(f"✅ robots.txt已生成: robots.txt")
                    print(f"   文件大小: {file_size / 1024:.2f} KB")
                    print(f"   Sitemap URL: {base_url}/sitemap.xml")
                    
                except Exception as e:
                    print(f"❌ robots.txt生成失败: {e}")
            
            def update_data_json():
                try:
                    if not os.path.exists('data.json'):
                        print("⚠️  data.json不存在，跳过更新")
                        return
                    
                    with open('data.json', 'r', encoding='utf-8') as f:
                        data = json.load(f)
                    
                    with open('config.json', 'r', encoding='utf-8') as f:
                        config = json.load(f)
                    
                    domain = config.get('siteDomain', '')
                    protocol = config.get('settings', {}).get('protocol', 'https')
                    
                    if not domain.startswith(('http://', 'https://')):
                        new_domain = f"{protocol}://{domain}"
                    else:
                        new_domain = domain
                    
                    old_domain = data.get('siteDomain', '')
                    
                    if old_domain != new_domain:
                        data['siteDomain'] = new_domain
                        
                        ad_config = config.get('ad', {})
                        data['ad'] = ad_config
                        
                        source_names_configured = [s['name'] for s in config.get('sources', [])]
                        existing_sources = data.get('sources', {})
                        
                        for source_name in list(existing_sources.keys()):
                            if source_name not in source_names_configured:
                                del existing_sources[source_name]
                                print(f"   🗑️ 已移除数据源: {source_name}")
                        
                        data['sourceNames'] = list(existing_sources.keys())
                        data['stats'] = {
                            'totalSources': len(existing_sources),
                            'totalItems': sum(len(items) for items in existing_sources.values()),
                            'sourceStats': {name: len(items) for name, items in existing_sources.items()}
                        }
                        
                        with open('data.json', 'w', encoding='utf-8') as f:
                            json.dump(data, f, ensure_ascii=False, indent=2)
                        
                        print(f"✅ 数据文件已更新: data.json")
                        print(f"   域名: {old_domain} → {new_domain}")
                    else:
                        print("ℹ️  data.json域名已是最新")
                        
                except Exception as e:
                    print(f"⚠️  更新data.json失败: {e}")
            
            print("\n🗺️ 正在生成网站地图...")
            generate_sitemap()
            
            print("\n🤖 正在生成robots.txt...")
            generate_robots()
            
            print("\n📄 正在检查data.json...")
            update_data_json()
            
            print("\n✨ 所有静态文件生成完成！")
EOF
            
          else
            echo "⚠️  未找到配置文件"
          fi

      - name: Run collector (if needed)
        if: github.event.inputs.skip_collect != 'true' && github.event.inputs.force_regenerate != 'true'
        run: |
          echo "🚀 开始数据采集..."
          python collector.py --once

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
