name: Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read config and setup variables
        id: config
        run: |
          echo "Reading config.json..."
          DOMAIN=$(python3 -c "import json; c=json.load(open('config.json')); print(c.get('siteDomain',''))")
          PROTOCOL=$(python3 -c "import json; c=json.load(open('config.json')); print(c.get('settings',{}).get('protocol','https'))")
          
          if [[ "$DOMAIN" == https://* ]] || [[ "$DOMAIN" == http://* ]]; then
            BASE_URL="$DOMAIN"
          else
            BASE_URL="${PROTOCOL}://${DOMAIN}"
          fi
          
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "protocol=$PROTOCOL" >> $GITHUB_OUTPUT
          echo "base_url=$BASE_URL" >> $GITHUB_OUTPUT
          
          echo "Config loaded:"
          echo "  Domain: $DOMAIN"
          echo "  Protocol: $PROTOCOL"
          echo "  Base URL: $BASE_URL"

      - name: Generate sitemap.xml
        run: |
          URL="${{ steps.config.outputs.base_url }}"
          TODAY=$(date +%Y-%m-%d)
          
          cat > sitemap.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>${URL}/</loc>
              <lastmod>${TODAY}</lastmod>
              <changefreq>daily</changefreq>
              <priority>1.0</priority>
            </url>
            <url>
              <loc>${URL}/index.html</loc>
              <lastmod>${TODAY}</lastmod>
              <changefreq>daily</changefreq>
              <priority>1.0</priority>
            </url>
          </urlset>
          EOF
          
          echo "✅ sitemap.xml generated"
          echo "URL: ${URL}/"
          ls -lh sitemap.xml

      - name: Generate robots.txt
        run: |
          URL="${{ steps.config.outputs.base_url }}"
          NOW=$(date -u '+%Y-%m-%d %H:%M:%S')
          
          cat > robots.txt << EOF
          # Robots.txt for ${URL}
          # Generated: ${NOW} UTC
          
          User-agent: *
          Allow: /
          Allow: /index.html
          Allow: /sitemap.xml
          
          Disallow: /*.json$
          Disallow: /*.py$
          Disallow: /*.sh$
          Disallow: /*.yml$
          Disallow: /config*
          Disallow: /data*
          Disallow: /.github/
          
          Sitemap: ${URL}/sitemap.xml
          EOF
          
          echo "✅ robots.txt generated"
          echo "Sitemap: ${URL}/sitemap.xml"
          ls -lh robots.txt

      - name: Update data.json with domain
        run: |
          URL="${{ steps.config.outputs.base_url }}"
          
          python3 << PYEOF
          import json
          
          try:
              with open('data.json', 'r') as f:
                  data = json.load(f)
              
              data['siteDomain'] = '${URL}'
              
              with open('data.json', 'w') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              
              print("✅ data.json updated with domain:", "${URL}")
          except Exception as e:
              print("⚠️ Could not update data.json:", e)
          PYEOF
          
          ls -lh data.json || true

      - name: Verify generated files
        run: |
          echo "=========================================="
          echo "Verifying generated files..."
          echo "=========================================="
          echo ""
          echo "sitemap.xml content (first 5 lines):"
          head -5 sitemap.xml
          echo ""
          echo "robots.txt content:"
          cat robots.txt
          echo ""
          echo "File sizes:"
          ls -lh sitemap.xml robots.txt data.json
          echo ""
          echo "=========================================="
          echo "✅ All files verified!"
          echo "=========================================="

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4