name: Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config.json'
      - 'collector.py'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate files from config.json
        run: |
          python3 << 'EOF'
          import json
          import os
          from datetime import datetime
          
          print("Reading config.json...")
          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          
          domain = config.get('siteDomain', '')
          protocol = config.get('settings', {}).get('protocol', 'https')
          
          if domain.startswith(('http://', 'https://')):
              base_url = domain
          else:
              base_url = f"{protocol}://{domain}"
          
          today = datetime.now().strftime('%Y-%m-%d')
          now = datetime.now().strftime('%Y-%m-%d %H:%M:%S')
          
          print(f"Domain: {base_url}")
          print(f"Date: {today}")
          
          sitemap = f'''<?xml version='1.0' encoding='utf-8'?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url><loc>{base_url}/</loc><lastmod>{today}</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>
            <url><loc>{base_url}/index.html</loc><lastmod>{today}</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>
          </urlset>'''
          
          with open('sitemap.xml', 'w', encoding='utf-8') as f:
              f.write(sitemap)
          print("✓ sitemap.xml generated")
          
          robots = f'''User-agent: *
          Allow: /
          Allow: /index.html
          Allow: /sitemap.xml
          Disallow: /*.json$
          Disallow: /*.py$
          Disallow: /.github/
          Sitemap: {base_url}/sitemap.xml'''
          
          with open('robots.txt', 'w', encoding='utf-8') as f:
              f.write(robots)
          print("✓ robots.txt generated")
          
          if os.path.exists('data.json'):
              with open('data.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
              
              data['siteDomain'] = base_url
              data['ad'] = config.get('ad', {})
              data['lastConfigUpdate'] = now
              
              sources_cfg = config.get('sources', [])
              source_names = [s['name'] for s in sources_cfg]
              existing_sources = data.get('sources', {})
              
              for name in list(existing_sources.keys()):
                  if name not in source_names:
                      del existing_sources[name]
              
              data['sourceNames'] = list(existing_sources.keys())
              data['stats'] = {
                  'totalSources': len(existing_sources),
                  'totalItems': sum(len(items) for items in existing_sources.values()),
                  'sourceStats': {name: len(items) for name, items in existing_sources.items()}
              }
          else:
              data = {
                  'siteDomain': base_url,
                  'ad': config.get('ad', {}),
                  'sources': {},
                  'sourceNames': [],
                  'stats': {'totalSources': 0, 'totalItems': 0, 'sourceStats': {}},
                  'lastConfigUpdate': now,
                  'lastCollection': None
              }
          
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          print("✓ data.json updated")
          
          print("\nDone! Base files generated.")
          EOF

      - name: Generate index.html with ads
        run: python3 generate_html.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml robots.txt data.json index.html
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "Update static files from config.json" && git push)

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - uses: actions/deploy-pages@v4
      
