name: Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Generate sitemap.xml
        run: |
          DOMAIN=$(python3 -c "import json; print(json.load(open('config.json')).get('siteDomain',''))" 2>/dev/null || echo "")
          PROTO=$(python3 -c "print(json.load(open('config.json')).get('settings',{}).get('protocol','https'))" 2>/dev/null || echo "https")
          
          [[ "$DOMAIN" == http* ]] && URL="$DOMAIN" || URL="${PROTO}://${DOMAIN}"
          
          cat > sitemap.xml << 'XMLEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url><loc>BASEURL/</loc><lastmod>DATE</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>
            <url><loc>BASEURL/index.html</loc><lastmod>DATE</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>
          </urlset>
          XMLEOF
          
          sed -i "s|BASEURL|${URL}|g; s|DATE|$(date +%Y-%m-%d)|g" sitemap.xml
          
          echo "sitemap.xml created with URL: ${URL}"

      - name: Generate robots.txt
        run: |
          DOMAIN=$(python3 -c "import json; print(json.load(open('config.json')).get('siteDomain',''))" 2>/dev/null || echo "")
          PROTO=$(python3 -c "print(json.load(open('config.json')).get('settings',{}).get('protocol','https'))" 2>/dev/null || echo "https")
          
          [[ "$DOMAIN" == http* ]] && URL="$DOMAIN" || URL="${PROTO}://${DOMAIN}"
          
          cat > robots.txt << 'EOF'
          User-agent: *
          Allow: /
          Allow: /index.html
          Allow: /sitemap.xml
          Disallow: /*.json$
          Disallow: /*.py$
          Disallow: /.github/
          Sitemap: BASEURL/sitemap.xml
          EOF
          
          sed -i "s|BASEURL|${URL}|g" robots.txt
          
          echo "robots.txt created"

      - name: Show generated files
        run: |
          echo "=== sitemap.xml ==="
          cat sitemap.xml
          echo ""
          echo "=== robots.txt ==="
          cat robots.txt
          echo ""
          ls -lh sitemap.xml robots.txt

      - uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4